[platformio]
default_envs = esp32-c3

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; ===== USB Serial (Required for ESP32-C3) =====
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ===== Libraries =====
lib_deps =
    ArduinoJson
    fastled/FastLED@^3.7.0
    brennanmke/EasyWiFi@^0.2.0

; ===== Monitor and Upload =====
monitor_speed = 115200
upload_speed = 460800
monitor_filters = esp32_exception_decoder
